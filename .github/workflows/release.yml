name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and bundle app
        run: VERSION=${{ steps.version.outputs.version }} ./Scripts/bundle.sh

      - name: Create zip archive
        run: |
          cd .build/release
          zip -r "Logger-TXT-${{ steps.version.outputs.version }}-macos.zip" "Logger-TXT.app"

      - name: Compute SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 ".build/release/Logger-TXT-${{ steps.version.outputs.version }}-macos.zip" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: ".build/release/Logger-TXT-${{ steps.version.outputs.version }}-macos.zip"
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"

          git clone https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/grantlucas/homebrew-tap.git tap-repo
          cd tap-repo

          mkdir -p Casks

          cat > Casks/logger-txt-gui.rb << EOF
          cask "logger-txt-gui" do
            version "${VERSION}"
            sha256 "${SHA}"

            url "https://github.com/grantlucas/Logger-TXT-OSX-Rewrite/releases/download/v#{version}/Logger-TXT-#{version}-macos.zip"
            name "Logger-TXT"
            desc "macOS menu bar app for quick timestamped logging"
            homepage "https://github.com/grantlucas/Logger-TXT-OSX-Rewrite"

            depends_on macos: ">= :sonoma"

            app "Logger-TXT.app"

            zap trash: [
              "~/Documents/Logger-TXT",
              "~/Library/Preferences/com.logger-txt.app.plist",
            ]
          end
          EOF

          # Remove leading whitespace from heredoc indentation (10 spaces)
          sed -i '' 's/^          //' Casks/logger-txt-gui.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/logger-txt-gui.rb
          git commit -m "chore: update logger-txt-gui cask to v${VERSION}"
          git push
